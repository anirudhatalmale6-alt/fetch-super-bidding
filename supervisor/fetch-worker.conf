[program:fetch-queue-worker]
process_name=%(program_name)s_%(process_num)02d
command=php /var/www/html/fetch/artisan queue:work database --sleep=3 --tries=3 --max-time=3600 --timeout=90
directory=/var/www/html/fetch
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=www-data
numprocs=2
redirect_stderr=true
stdout_logfile=/var/log/supervisor/fetch-worker.log
stopwaitsecs=3600

[program:fetch-scheduler]
process_name=%(program_name)s
command=bash -c "while true; do php /var/www/html/fetch/artisan schedule:run >> /dev/null 2>&1; sleep 60; done"
directory=/var/www/html/fetch
autostart=true
autorestart=true
user=www-data
redirect_stderr=true
stdout_logfile=/var/log/supervisor/fetch-scheduler.log
